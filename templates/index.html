<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#eef3f9;
        }

        .container-box{
            max-width:1200px;
            margin:40px auto;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:30px;
            font-weight:bold;
        }

        .card{
            margin-bottom:20px;
        }

        .btn{
            min-width:180px;
        }
    </style>
</head>

<body>

<div class="container">

<div class="container-box">

<h2>Credit Card Fraud Detection System</h2>

<form action="/predict" method="POST">

    <!-- Transaction Details -->
    <div class="card">

        <div class="card-header bg-primary text-white">
            Transaction Details
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Transaction Time</label>
                    <input type="number" step="any" class="form-control" name="Time" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Transaction Amount</label>
                    <input type="number" step="any" class="form-control" name="Amount" required>
                </div>

            </div>

        </div>

    </div>

    <!-- Principal Components -->
    <div class="card">

        <div class="card-header bg-success text-white">
            Principal Components (V1 - V28)
        </div>

        <div class="card-body">

            <div class="row">

                {% for i in range(1,29) %}

                <div class="col-md-3 mb-3">

                    <label class="form-label">V{{i}}</label>

                    <input
                        type="number"
                        step="any"
                        class="form-control"
                        name="V{{i}}"
                        placeholder="Enter V{{i}}"
                        required>

                </div>

                {% endfor %}

            </div>

        </div>

    </div>

    <div class="text-center mt-4">

        <button type="submit" class="btn btn-primary btn-lg">
            Predict Transaction
        </button>

        <a href="/" class="btn btn-secondary btn-lg">
            Home
        </a>

    </div>

</form>

</div>

</div>

</body>
</html>
