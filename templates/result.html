<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:linear-gradient(135deg,#0f172a,#1e3c72,#2a5298);

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:'Segoe UI',sans-serif;

        }

        .result-card{

            width:650px;

            background:white;

            border-radius:20px;

            padding:40px;

            text-align:center;

            box-shadow:0 15px 35px rgba(0,0,0,.35);

        }

        .title{

            color:#0d6efd;

            font-weight:bold;

            margin-bottom:30px;

        }

        .icon{

            font-size:80px;

            margin-bottom:20px;

        }

        .success{

            color:#198754;

        }

        .danger{

            color:#dc3545;

        }

        .confidence{

            margin-top:20px;

            font-size:22px;

            font-weight:bold;

        }

        .btn{

            width:200px;

            margin:10px;

            border-radius:30px;

        }

        hr{

            margin:30px 0;

        }

    </style>

</head>

<body>

<div class="result-card">

<h1 class="title">

Prediction Result

</h1>

{% if color=="success" %}

<i class="bi bi-shield-check icon success"></i>

<h2 class="success">

{{ prediction }}

</h2>

<p class="lead">

The transaction appears to be genuine.

</p>

{% else %}

<i class="bi bi-exclamation-triangle-fill icon danger"></i>

<h2 class="danger">

{{ prediction }}

</h2>

<p class="lead">

Warning! The transaction appears to be fraudulent.

</p>

{% endif %}

<hr>

<div class="confidence">

Confidence Score

<br><br>

<div class="progress">

<div class="progress-bar bg-success"

role="progressbar"

style="width: {{ confidence }}%;"

aria-valuenow="{{ confidence }}"

aria-valuemin="0"

aria-valuemax="100">

{{ confidence }}%

</div>

</div>

</div>

<div class="mt-5">

<a href="/predict"

class="btn btn-primary btn-lg">

<i class="bi bi-arrow-repeat"></i>

Predict Again

</a>

<a href="/"

class="btn btn-secondary btn-lg">

<i class="bi bi-house-door-fill"></i>

Home

</a>

</div>

</div>

</body>

</html>
